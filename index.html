<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushana | Welcome</title>
    <style>
        :root {
            --chic-black: #1a1a1a;
            --info-white: #ffffff;
            --satin-gold: #c9a050;
            --text-gray: #555;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            flex-direction: row; /* Default side-by-side for desktop */
        }

        .split {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            text-decoration: none;
            position: relative;
            text-align: center;
            padding: 20px;
        }

        /* Left Side: Makeup Studio */
        .left {
            background-color: var(--chic-black);
            color: white;
            border-right: 2px solid var(--satin-gold);
        }

        /* Right Side: Digital Info */
        .right {
            background-color: var(--info-white);
            color: var(--chic-black);
        }

        /* Hover Effect for Desktop */
        @media (min-width: 769px) {
            .split:hover {
                flex: 1.4;
            }
        }

        .split h1 {
            font-size: clamp(1.8rem, 5vw, 3rem); /* Dynamic text size */
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-family: 'Cormorant Garamond', serif;
        }

        .split p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .btn {
            padding: 12px 35px;
            border: 2px solid;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s ease;
        }

        .left .btn { border-color: var(--satin-gold); color: var(--satin-gold); }
        .right .btn { border-color: var(--chic-black); color: var(--chic-black); }

        .left .btn:hover { background: var(--satin-gold); color: white; }
        .right .btn:hover { background: var(--chic-black); color: white; }

        /* --- MOBILE RESPONSIVE UPDATES --- */
        @media (max-width: 768px) {
            .container {
                flex-direction: column; /* Stack vertically on phones */
            }

            .left {
                border-right: none;
                border-bottom: 2px solid var(--satin-gold);
            }

            .split h1 {
                font-size: 2.2rem;
                margin-bottom: 5px;
            }

            .split p {
                font-size: 0.9rem;
                margin-bottom: 15px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <a href="studio.html" class="split left">
            <h1>Makeup Studio</h1>
            <p>Nails • Facial • Beauty</p>
            <div class="btn">Enter Studio</div>
        </a>

        <a href="info.html" class="split right">
            <h1>Khushana Info</h1>
            <p>Web Dev • Design • Marketing</p>
            <div class="btn">Explore Services</div>
        </a>
    </div>

</body>
</html>
