<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Khushana Make Up Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #0a0a0a;
            --card-bg: #111111;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        h1, h2, nav a { font-family: 'Playfair Display', serif; }

        /* --- Animated Logo Section --- */
        .logo-container {
            text-align: center;
            padding: 50px 20px;
            animation: fadeInDown 1.5s ease-out;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
            border: 1px solid var(--gold);
            padding: 10px;
            transition: transform 0.5s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Navigation --- */
        nav {
            text-align: center;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            padding: 18px 0;
            margin-bottom: 40px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: color 0.3s, letter-spacing 0.3s;
        }

        nav a:hover { 
            color: var(--gold); 
            letter-spacing: 3px;
        }

        /* --- Professional Gallery Grid --- */
        .gallery-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
            display: grid;
            /* Balanced 3-column setup on desktops */
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 320px;
            gap: 25px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            background: #000;
            border-radius: 4px;
            transition: border-color 0.4s ease;
        }

        /* Premium balanced layout spans */
        .gallery-item.tall { grid-row: span 2; } /* 640px height + gap */
        .gallery-item.wide { grid-column: span 2; } /* Spans 2 blocks horizontally */

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center; /* Ensures makeup/faces remain centered */
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), filter 0.5s ease;
        }

        /* Video Overlay Icon styling */
        .video-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-size: 0.9rem;
            transition: background 0.3s, transform 0.3s;
        }

        /* View Details Overlay */
        .gallery-item::after {
            content: 'VIEW WORK';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -30%); /* Subtle upward movement entry */
            color: var(--text-light);
            letter-spacing: 4px;
            font-size: 0.75rem;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            border-bottom: 1px solid var(--gold);
            padding: 8px 15px;
            z-index: 5;
        }

        /* Hover States */
        .gallery-item:hover {
            border-color: var(--gold);
        }
        .gallery-item:hover img { 
            transform: scale(1.04); 
            filter: brightness(50%) contrast(1.1); 
        }
        .gallery-item:hover::after { 
            opacity: 1; 
            transform: translate(-50%, -50%);
        }
        .gallery-item:hover .video-icon {
            background: var(--gold);
            color: #000;
            transform: scale(1.1);
        }

        /* --- Lightbox --- */
        #lightbox {
            position: fixed;
            z-index: 3000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 4, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #lightbox.active { 
            display: flex; 
            opacity: 1;
        }
        
        #lightbox iframe, #lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border: 1px solid var(--gold);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            background-color: #000;
        }

        .close-btn {
            position: absolute;
            top: 25px; right: 35px;
            color: #fff;
            font-size: 35px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover { color: var(--gold); }

        footer {
            text-align: center;
            padding: 80px 20px 40px 20px;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 2px;
            border-top: 1px solid #1a1a1a;
        }

        /* --- Seamless Responsive Design --- */
        @media (max-width: 1024px) {
            .gallery-wrapper {
                grid-template-columns: repeat(2, 1fr);
                grid-auto-rows: 300px;
            }
            .gallery-item.wide { grid-column: span 1; } /* Prevents layout collapse on mid-screens */
        }

        @media (max-width: 768px) {
            .gallery-wrapper { 
                grid-template-columns: 1fr; 
                grid-auto-rows: auto;
                gap: 20px;
            }
            .gallery-item.tall, .gallery-item.wide { grid-column: span 1; grid-row: span 1; }
            .gallery-item { height: 400px; } /* Clean, consistent blocks on mobile phones */
            nav a { margin: 0 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/logo1.jpeg" alt="Khushana Studio">
    </div>

    <nav>
        <a href="studio.html">Home</a>
        <a href="#" style="color: var(--gold);">Portfolio</a>
        <a href="#">Services</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="gallery-wrapper">
        
        <!-- Row 1 -->
        <div class="gallery-item tall" onclick="openLightbox(this)">
            <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/priya.png" alt="Nail Art Bridal Design">
        </div>

        <div class="gallery-item wide" onclick="openLightbox(this)">
            <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/tan.png" alt="Studio Professional Shot">
        </div>

        <!-- Row 2 -->
        <div class="gallery-item tall" onclick="openVideo('https://www.instagram.com/reels/videos/DXb_OzMErti/')">
            <div class="video-icon">▶</div>
            <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/poojaa.jpeg" alt="Nail Art Video Reel">
        </div>

        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/tan1.png" alt="Glamour Makeup Shot">
        </div>

        <!-- Row 3 -->
        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/tan2.png" alt="Luxury Bridal Portfolio">
        </div>

        <div class="gallery-item wide" onclick="openLightbox(this)">
            <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/tan3.png" alt="Studio Presentation">
        </div>

        <!-- Row 4 -->
        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/tan4.png" alt="HD Bridal Editorial">
        </div>

      

    </div>

    <footer>
        <p>&copy; 2026 KHUSHANA MAKE UP STUDIO. ALL RIGHTS RESERVED.</p>
    </footer>

    <!-- Lightbox Structure -->
    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <div id="content-area" style="width:100%; display:flex; justify-content:center; align-items:center;"></div>
    </div>

    <script>
        const lb = document.getElementById('lightbox');
        const contentArea = document.getElementById('content-area');

        function openLightbox(el) {
            const imgSrc = el.querySelector('img').src;
            contentArea.innerHTML = `<img src="${imgSrc}" alt="Enlarged Portfolio View">`;
            lb.style.display = 'flex';
            setTimeout(() => lb.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function openVideo(videoUrl) {
            // Cleans and properly structures Instagram embed links seamlessly 
            let embedUrl = videoUrl;
            if (!embedUrl.includes('/embed')) {
                // Strip queries if any and append pure embed structural pathway
                embedUrl = embedUrl.split('?')[0].replace(/\/$/, "") + "/embed/";
            }
            
            contentArea.innerHTML = `<iframe src="${embedUrl}" width="380" height="580" frameborder="0" scrolling="no" allowtransparency="true" allow="encrypted-media"></iframe>`;
            lb.style.display = 'flex';
            setTimeout(() => lb.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lb.classList.remove('active');
            setTimeout(() => {
                lb.style.display = 'none';
                contentArea.innerHTML = ''; 
            }, 300);
            document.body.style.overflow = 'auto';
        }

        lb.addEventListener('click', function(e) {
            if (e.target === lb || e.target === contentArea) closeLightbox();
        });
    </script>
</body>
</html>
