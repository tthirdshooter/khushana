<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | Khushana Sovereignty</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-gold: #b8860b;
            --midnight: #0a0a0a;
            --input-bg: #1a1a1a;
        }

        body {
            margin: 0;
            background: var(--midnight);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .booking-card {
            background: #111;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border: 1px solid #222;
            border-top: 5px solid var(--deep-gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-container img {
            height: 70px;
            width: auto;
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--deep-gold);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 30px;
            font-size: 1.4rem;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid #333;
            color: white;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: var(--deep-gold);
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--deep-gold);
            color: var(--midnight);
            border: none;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .call-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: transparent;
            color: var(--deep-gold);
            border: 1px solid var(--deep-gold);
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
            letter-spacing: 1px;
            box-sizing: border-box;
        }

        .call-btn:hover { background: rgba(184, 134, 11, 0.1); color: #fff; border-color: #fff; }

        #success-message {
            display: none;
            text-align: center;
            padding: 30px 0;
        }

        .business-hours {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #222;
            text-align: center;
            color: #666;
            font-size: 0.75rem;
            line-height: 1.6;
        }

        .nav-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #444;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .fade-out { opacity: 0; transition: opacity 0.4s ease; }
    </style>
</head>
<body>

    <div class="booking-card">
        <div class="logo-container">
            <img src="logo1.png" alt="Khushana Logo">
        </div>

        <div id="form-container">
            <h2>Consultation Request</h2>
            <form id="whatsappForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label>Interest</label>
                    <select id="interest">
                        <option value="Beauty">Khushana Makeup Studio (Beauty)</option>
                        <option value="Tech">Khushana Digital Info (Tech)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Desired Service</label>
                    <select id="service">
                        <option>Bridal Makeup</option>
                        <option>Nail Art / Manicure</option>
                        <option>Haircut / Styling</option>
                        <option>Website Development</option>
                        <option>Digital Marketing</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea id="userMsg" rows="3" placeholder="How can we help?"></textarea>
                </div>

                <button type="submit" class="submit-btn">SEND WHATSAPP INQUIRY</button>
            </form>
            
            <a href="tel:+91XXXXXXXXXX" class="call-btn">📞 DIRECT CALL</a>
        </div>

        <div id="success-message">
            <h3 style="font-family: 'Cinzel'; color: var(--deep-gold);">Request Initiated</h3>
            <p>Redirecting to WhatsApp...</p>
            <button onclick="location.reload()" class="nav-home" style="border:none; background:none; cursor:pointer; width:100%;">Click here to reset form</button>
        </div>

        <div class="business-hours">
            <strong>BUSINESS HOURS</strong><br>
            Monday – Saturday: 10:00 AM – 8:00 PM<br>
            Sunday: By Appointment Only
        </div>

        <a href="index.html" class="nav-home">BACK TO PORTAL</a>
    </div>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // CONFIG: Replace with your 10-digit number (include country code, no +)
            const myPhoneNumber = "91XXXXXXXXXX"; 

            const name = document.getElementById('userName').value;
            const interest = document.getElementById('interest').value;
            const service = document.getElementById('service').value;
            const message = document.getElementById('userMsg').value;

            const whatsappMessage = `*New Website Inquiry*%0A%0A` +
                `*Name:* ${encodeURIComponent(name)}%0A` +
                `*Interest:* ${encodeURIComponent(interest)}%0A` +
                `*Service:* ${encodeURIComponent(service)}%0A` +
                `*Message:* ${encodeURIComponent(message)}`;

            const url = `https://wa.me/${myPhoneNumber}?text=${whatsappMessage}`;

            const formContainer = document.getElementById('form-container');
            const successMsg = document.getElementById('success-message');

            formContainer.classList.add('fade-out');
            
            setTimeout(() => {
                formContainer.style.display = 'none';
                successMsg.style.display = 'block';
                window.open(url, '_blank');
            }, 400);
        });
    </script>

</body>
</html>
