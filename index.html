<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO OPTIMIZED: Dedicated Studio Title -->
    <title>Khushana | Luxury Makeup Studio</title>
    
    <!-- SEO: Meta Descriptions focused purely on beauty & bridal services -->
    <meta name="description" content="Discover Khushana. Experience premium bridal makeovers, celebrity glamour, and professional beauty artistry at our luxury Makeup Studio.">
    <meta name="keywords" content="Nail Artistry ,luxury makeup studio, makeup artist, premium celebrity makeover, professional beauty artistry">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph for Social Media Search Visibility -->
    <meta property="og:title" content="Khushana | Luxury Makeup Studio">
    <meta property="og:description" content="Premium Nail artistry and luxury beauty makeovers. Step inside the world of Khushana.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Local Business Schema Markup for Google Maps Pack Ranking -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BeautySalon",
      "name": "Khushana Makeup Studio",
      "description": "Premium makeup studio specializing in bridal makeovers, celebrity glamour, and professional beauty artistry.",
      "url": "https://www.khushana.com",
      "telephone": "+1-XXX-XXX-XXXX", 
      "priceRange": "$$$"
    }
    </script>

    <style>
        :root {
            --olive-deep: #3b4d3b;
            --olive-light: #4c634c;
            --cream-light: #fdfaf5;
            --satin-gold: #c9a050;
            --deep-gold: #b8860b;
            --text-dark: #2c3a2c;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: var(--olive-deep);
        }

        /* --- LOADER STYLES --- */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--olive-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 1s ease, visibility 1s;
        }

        .loader-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loader-logo {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(201, 160, 80, 0.5));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .shimmer {
            color: var(--satin-gold);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            letter-spacing: 10px;
            background: linear-gradient(90deg, var(--olive-deep), #fff, var(--olive-deep));
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite linear;
            margin: 0;
        }

        .progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 25px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0;
            height: 100%;
            background: var(--satin-gold);
            animation: fillProgress 2.5s forwards ease-in-out;
        }

        @keyframes shimmer {
            0% { background-position: -200%; }
            100% { background-position: 200%; }
        }

        @keyframes fillProgress { to { width: 100%; } }

        /* --- MAIN CONTAINER --- */
        .container {
            height: 100vh;
            width: 100vw;
            perspective: 1000px;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .loaded .container { opacity: 1; }

        .studio-showcase {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: transform 0.2s ease-out;
            text-decoration: none;
            position: relative;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            transform-style: preserve-3d;
            background: linear-gradient(-45deg, var(--olive-deep), var(--olive-light), var(--olive-deep));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--cream-light);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content-wrapper {
            pointer-events: none;
            transform: translateZ(60px);
            z-index: 2;
        }

        .studio-showcase h1, .studio-showcase h2 {
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 5px 0;
            font-family: 'Cormorant Garamond', serif;
        }
        
        .studio-showcase h1 { font-size: clamp(2.5rem, 6vw, 5rem); }
        .studio-showcase h2 { font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 400; }

        .studio-showcase h1, .studio-showcase h2 { color: var(--satin-gold); }

        .studio-showcase p {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-weight: 300;
            opacity: 0.9;
        }

        /* Screen-reader hidden semantic text */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .btn {
            display: inline-block;
            padding: 18px 50px;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            transition: 0.4s;
            border: 1px solid var(--satin-gold);
            color: var(--satin-gold);
            background: transparent;
            pointer-events: auto;
        }

        .btn:hover {
            background: var(--satin-gold);
            color: var(--olive-deep);
        }

        #particleCanvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        .sparkle {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--satin-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px var(--satin-gold);
            animation: sparkle-fade 0.8s linear forwards;
        }

        @keyframes sparkle-fade {
            to { transform: scale(0) translateY(20px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="sr-only">
    <h1>Khushana Luxury Makeup Studio</h1>
    <p>Welcome to Khushana, featuring our premier Makeup Studio for luxury bridal makeup and celebrity makeovers.</p>
</div>

<div id="loader">
    <div class="loader-content">
        <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/logo1.png" class="loader-logo" alt="Khushana Luxury Studio Logo">
        <h2 class="shimmer">KHUSHANA</h2>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <!-- STUDIO FULL SCREEN SHOWCASE -->
    <a href="studio.html" class="studio-showcase" id="studio-main" aria-label="Enter Khushana Makeup Studio Portfolio and Booking Engine">
        <canvas id="particleCanvas"></canvas>
        <div class="content-wrapper">
            <h1>KHUSHANA</h1>
            <h2>Makeup Studio</h2>
            <p>•Nail Artistry • Elegance • Makeup </p>
            <div class="btn">Enter Studio</div>
        </div>
    </a>
</div>

<script>
    // 1. Loader Logic
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            document.getElementById('loader').style.visibility = 'hidden';
            document.body.classList.add('loaded');
        }, 2500);
    });

    // 2. Audio Logic
    document.addEventListener('click', () => {
        const audio = document.getElementById('bgMusic');
        if (audio.paused) {
            audio.volume = 0.2;
            audio.play().catch(() => {});
        }
    }, { once: true });

    // 3. Gold Dust Particle System
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedY = Math.random() * -0.4 - 0.1;
            this.opacity = Math.random() * 0.6;
        }
        update() {
            this.y += this.speedY;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = `rgba(201, 160, 80, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // 4. 3D Tilt Effect
    const showcase = document.getElementById('studio-main');
    showcase.addEventListener('mousemove', (e) => {
        const rect = showcase.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const rotateX = (rect.height / 2 - y) / 40;
        const rotateY = (x - rect.width / 2) / 40;
        showcase.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
    showcase.addEventListener('mouseleave', () => {
        showcase.style.transform = `rotateX(0deg) rotateY(0deg)`;
    });

    // 5. Gold Sparkle Trail
    showcase.addEventListener('mousemove', (e) => {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = e.clientX + 'px';
        sparkle.style.top = e.clientY + 'px';
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 800);
    });
</script>

</body>
</html>
