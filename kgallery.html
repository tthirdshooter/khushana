<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Khushana Make Up Studio</title>
    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #0a0a0a;
            --card-bg: #111111;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Playfair Display', serif, Arial;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Animated Logo Section --- */
        .logo-container {
            text-align: center;
            padding: 50px 20px;
            animation: fadeInDown 1.5s ease-out;
        }

        .logo-container img {
            max-width: 200px;
            height: auto;
            border: 1px solid var(--gold);
            padding: 10px;
            transition: transform 0.5s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Navigation --- */
        nav {
            text-align: center;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            padding: 15px 0;
            margin-bottom: 40px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--gold); }

        /* --- Gallery Grid --- */
        .gallery-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 400px;
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
            cursor: pointer;
        }

        /* Making some items larger for a professional "Masonry" look */
        .gallery-item.tall { grid-row: span 2; }
        .gallery-item.wide { grid-column: span 2; }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .gallery-item:hover img {
            filter: grayscale(0%);
            transform: scale(1.1);
        }

        .gallery-item::after {
            content: 'VIEW DETAILS';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold);
            letter-spacing: 3px;
            font-size: 0.7rem;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid var(--gold);
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
        }

        .gallery-item:hover::after { opacity: 1; }

        /* --- Lightbox --- */
        #lightbox {
            position: fixed;
            z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
        }

        #lightbox.active { display: flex; }

        #lightbox img {
            max-width: 90%;
            max-height: 85%;
            border: 2px solid var(--gold);
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 30px;
            color: var(--gold);
            font-size: 40px;
            cursor: pointer;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .gallery-item.wide { grid-column: span 1; }
            .gallery-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/logo1.jpeg" alt="Khushana Make Up Studio">
    </div>

    <nav>
        <a href="studio.html">Home</a>
        <a href="#" style="color: var(--gold);">Portfolio</a>
        <a href="#">Services</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="gallery-wrapper">
        <div class="gallery-item tall" onclick="openLightbox(this)">
            <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=800" alt="Bridal Look 1">
        </div>
        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&w=800" alt="Makeup Detail">
        </div>
        <div class="gallery-item wide" onclick="openLightbox(this)">
            <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796?auto=format&fit=crop&w=1200" alt="Studio Shot">
        </div>
        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="https://images.unsplash.com/photo-1526045478516-99145907023c?auto=format&fit=crop&w=800" alt="Evening Glam">
        </div>
        <div class="gallery-item tall" onclick="openLightbox(this)">
            <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/1.jpeg" alt="Tradition">
        </div>
    </div>

    <footer>
        <p>&copy; 2026 KHUSHANA MAKE UP STUDIO. ALL RIGHTS RESERVED.</p>
    </footer>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');

        function openLightbox(el) {
            lbImg.src = el.querySelector('img').src;
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lb.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
