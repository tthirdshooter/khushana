<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushana Digital | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #00f2ff; /* Cyber Cyan */
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Particle Canvas */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .logo-container {
            margin-bottom: 2rem;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: -3px;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0, 242, 255, 0.1);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .countdown-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 4rem;
        }

        .time-item {
            display: flex;
            flex-direction: column;
        }

        .time-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            font-weight: 300;
            color: #fff;
        }

        .time-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #555;
            margin-top: -5px;
        }

        .email-form {
            display: flex;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 16px;
            max-width: 450px;
            margin: 0 auto;
            transition: border-color 0.4s;
        }

        .email-form:focus-within {
            border-color: var(--accent);
        }

        input {
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            flex-grow: 1;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        @media (max-width: 600px) {
            .countdown-row { gap: 15px; }
            .time-val { font-size: 2rem; }
            .email-form { flex-direction: column; border-radius: 20px; }
            button { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="content">
        <div class="status-pill">
            <span class="status-dot"></span>
            System: Initializing Launch
        </div>
        
        <div class="logo-container">
            <h1 class="logo-text">KHUSHANA</h1>
        </div>

        <div class="countdown-row">
            <div class="time-item">
                <span class="time-val" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-item">
                <span class="time-val" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-item">
                <span class="time-val" id="mins">00</span>
                <span class="time-label">Mins</span>
            </div>
        </div>

        <form class="email-form">
            <input type="email" placeholder="access@khushana.digital" required>
            <button type="submit">Get Early Access</button>
        </form>
    </div>

    <script>
        // Particle System Script
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(0, 242, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        createParticles();
        animate();

        // Timer Logic
        const launchDate = new Date().getTime() + (14 * 24 * 60 * 60 * 1000);
        setInterval(() => {
            const now = new Date().getTime();
            const d = launchDate - now;
            document.getElementById('days').innerText = Math.floor(d / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);
    </script>
</body>
</html>
