<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Feedback | Khushana Makeup Studio</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #720e3d;
            --accent: #f48fb1;
            --bg-gradient: linear-gradient(135deg, #fff5f8 0%, #ffe4ec 100%);
            --white: #ffffff;
            --text: #444;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .feedback-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 550px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(114, 14, 61, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        h2 {
            color: var(--text);
            margin-bottom: 25px;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .full-width { grid-column: 1 / -1; }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            background: white;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(244, 143, 177, 0.2);
        }

        /* Star Rating System */
        .rating-wrapper { margin: 15px 0; }
        .stars {
            display: flex;
            justify-content: center;
            flex-direction: row-reverse;
            gap: 10px;
        }
        .stars input { display: none; }
        .stars label {
            font-size: 32px;
            color: #ddd;
            cursor: pointer;
            transition: 0.2s;
        }
        .stars input:checked ~ label,
        .stars label:hover,
        .stars label:hover ~ label { color: var(--accent); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background: #5a0b31; transform: translateY(-2px); }
        
        #success-msg { display: none; padding: 40px 0; }

        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="feedback-container">
    <div id="form-content">
        <div class="logo">Khushana</div>
        <h2>Share Your Glow Experience</h2>

        <div class="form-grid">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="custName" placeholder="Enter your name">
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="custPhone" placeholder="10-digit mobile">
            </div>
            <div class="input-group full-width">
                <label>Service Received</label>
                <input type="text" id="custService" placeholder="e.g. Bridal Makeup, Party Glow">
            </div>
            <div class="input-group full-width">
                <label>Your Address (City/Area)</label>
                <input type="text" id="custAddress" placeholder="Enter your area or city">
            </div>
        </div>

        <div class="rating-wrapper">
            <label>Overall Experience</label>
            <div class="stars">
                <input type="radio" name="star" id="star5" value="5"><label for="star5">★</label>
                <input type="radio" name="star" id="star4" value="4"><label for="star4">★</label>
                <input type="radio" name="star" id="star3" value="3"><label for="star3">★</label>
                <input type="radio" name="star" id="star2" value="2"><label for="star2">★</label>
                <input type="radio" name="star" id="star1" value="1"><label for="star1">★</label>
            </div>
        </div>

        <div class="input-group">
            <label>Detailed Feedback</label>
            <textarea id="custComments" rows="3" placeholder="Tell us more about your transformation..."></textarea>
        </div>

        <button onclick="handleSubmit()">Send Feedback 💖</button>
        <p style="font-size: 11px; color: #aaa; margin-top: 15px;">© 2026 Khushana Makeup Studio</p>
    </div>

    <div id="success-msg">
        <div style="font-size: 50px; margin-bottom: 15px;">🎉</div>
        <h2 style="color: var(--primary);">Thank You for Your Feedback!</h2>
        <p style="color: #666;">We've received your details. Your review helps us serve you better!</p>
        <button onclick="location.reload()" style="background: var(--accent); margin-top: 15px;">Submit New Feedback</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyAWnqBp3OdNg6JGjJ_xGsJsCTeOg_bp_8A",
        authDomain: "khushanastudio.firebaseapp.com",
        projectId: "khushanastudio",
        storageBucket: "khushanastudio.firebasestorage.app",
        messagingSenderId: "988189434269",
        appId: "1:988189434269:web:e0afc4deac7c0a21da4f74",
        measurementId: "G-L4L0G6F6M3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function handleSubmit() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        const service = document.getElementById('custService').value.trim();
        const comments = document.getElementById('custComments').value.trim();
        const rating = document.querySelector('input[name="star"]:checked')?.value;

        if (!name || !phone || !rating) {
            alert("Please provide your Name, Phone, and a Star Rating!");
            return;
        }

        const submitBtn = document.querySelector('button');
        submitBtn.disabled = true;
        submitBtn.innerText = "Processing...";

        try {
            await db.collection("feedback").add({
                customerName: name,
                phone: phone,
                address: address,
                service: service,
                rating: parseInt(rating),
                comments: comments,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('form-content').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';

        } catch (error) {
            console.error("Firebase Error: ", error);
            alert("Connection error. Please check your internet and try again.");
            submitBtn.disabled = false;
            submitBtn.innerText = "Send Feedback 💖";
        }
    }
</script>

</body>
</html>
