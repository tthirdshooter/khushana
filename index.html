
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushana | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Updated Color Palette */
            --olive-deep: #3b4d3b;      /* Elegant Olive */
            --olive-light: #4c634c;     /* Lighter Olive for gradients */
            --cream-light: #fdfaf5;     /* Soft luxury cream */
            --satin-gold: #c9a050;      /* Signature Gold */
            --deep-gold: #b8860b;       /* Accent Gold */
            --text-dark: #2c3a2c;       /* Dark olive for text on cream */
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: var(--olive-deep);
        }

        /* --- LOADER STYLES --- */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--olive-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 1s ease, visibility 1s;
        }

        .loader-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loader-logo {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(201, 160, 80, 0.5));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .shimmer {
            color: var(--satin-gold);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            letter-spacing: 10px;
            background: linear-gradient(90deg, var(--olive-deep), #fff, var(--olive-deep));
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite linear;
            margin: 0;
        }

        .progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 25px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0;
            height: 100%;
            background: var(--satin-gold);
            animation: fillProgress 2.5s forwards ease-in-out;
        }

        @keyframes shimmer {
            0% { background-position: -200%; }
            100% { background-position: 200%; }
        }

        @keyframes fillProgress { to { width: 100%; } }

        /* --- MAIN CONTAINER --- */
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            flex-direction: row;
            perspective: 1000px;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .loaded .container { opacity: 1; }

        .split {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: transform 0.2s ease-out, flex 0.8s cubic-bezier(0.77, 0, 0.175, 1);
            text-decoration: none;
            position: relative;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        /* LEFT SIDE: Olive & Gold */
        .left {
            background: linear-gradient(-45deg, var(--olive-deep), var(--olive-light), var(--olive-deep));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--cream-light);
            border-right: 1px solid rgba(201, 160, 80, 0.3);
        }

        /* RIGHT SIDE: Cream & Olive/Gold */
        .right {
            background: linear-gradient(-45deg, var(--cream-light), #fffefc, var(--cream-light));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (min-width: 769px) {
            .split:hover { flex: 1.4; }
        }

        .content-wrapper {
            pointer-events: none;
            transform: translateZ(60px);
            z-index: 2;
        }

        .split h1 {
            font-size: clamp(1.5rem, 4vw, 3rem);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 5px 0;
            font-family: 'Cormorant Garamond', serif;
        }

        .left h1 { color: var(--satin-gold); }
        .right h1 { color: var(--olive-deep); }

        .split p {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: 300;
            opacity: 0.9;
        }

        .btn {
            padding: 15px 40px;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            transition: 0.4s;
            border: 1px solid;
            background: transparent;
        }

        /* Left Button: Gold Outline */
        .left .btn { border-color: var(--satin-gold); color: var(--satin-gold); }
        .left .btn:hover { background: var(--satin-gold); color: var(--olive-deep); }

        /* Right Button: Olive Outline */
        .right .btn { border-color: var(--olive-deep); color: var(--olive-deep); }
        .right .btn:hover { background: var(--olive-deep); color: var(--cream-light); }

        #particleCanvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .sparkle {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--satin-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px var(--satin-gold);
            animation: sparkle-fade 0.8s linear forwards;
        }

        @keyframes sparkle-fade {
            to { transform: scale(0) translateY(20px); opacity: 0; }
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .split { flex: 1; border-right: none; border-bottom: 1px solid rgba(201, 160, 80, 0.2); }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-content">
        <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/greenlogo.png" class="loader-logo" alt="Khushana Logo">
        <h2 class="shimmer">KHUSHANA</h2>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <!-- STUDIO SIDE (OLIVE) -->
    <a href="studio.html" class="split left" id="studio-side">
        <canvas id="particleCanvas"></canvas>
        <div class="content-wrapper">
            <h1>KHUSHANA</h1>
            <h1>Makeup Studio</h1>
            <p>Artistry • Elegance • Beauty</p>
            <div class="btn">Enter Studio</div>
        </div>
    </a>

    <!-- DIGITAL SIDE (CREAM) -->
    <a href="info.html" class="split right">
        <div class="content-wrapper">
            <h1>Khushana Digital</h1>
            <p>Design • Dev • Strategy</p>
            <div class="btn">Explore Services</div>
        </div>
    </a>
</div>

<script>
    // 1. Loader Logic
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            document.getElementById('loader').style.visibility = 'hidden';
            document.body.classList.add('loaded');
        }, 2500);
    });

    // 2. Audio Logic
    document.addEventListener('click', () => {
        const audio = document.getElementById('bgMusic');
        if (audio.paused) {
            audio.volume = 0.2;
            audio.play().catch(() => {});
        }
    }, { once: true });

    // 3. Gold Dust Particle System
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() {
        const side = document.getElementById('studio-side');
        canvas.width = side.offsetWidth;
        canvas.height = side.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedY = Math.random() * -0.4 - 0.1;
            this.opacity = Math.random() * 0.6;
        }
        update() {
            this.y += this.speedY;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = `rgba(201, 160, 80, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 60; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // 4. 3D Tilt Effect
    const cards = document.querySelectorAll('.split');
    cards.forEach(card => {
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const rotateX = (rect.height / 2 - y) / 25;
            const rotateY = (x - rect.width / 2) / 25;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });
    });

    // 5. Gold Sparkle Trail on Studio Side
    const studioSide = document.getElementById('studio-side');
    studioSide.addEventListener('mousemove', (e) => {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = e.clientX + 'px';
        sparkle.style.top = e.clientY + 'px';
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 800);
    });
</script>

</body>
</html>
