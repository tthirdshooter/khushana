<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushana Makeup Studio | Inventory & Services</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #720e3d; --accent: #f48fb1; --bg: #fff5f8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        @media screen {
            .main-wrapper { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
            .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
            #printReceipt { display: none; }
            .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
            .badge-serv { background: #e1bee7; color: #7b1fa2; }
            .badge-prod { background: #c8e6c9; color: #2e7d32; }
        }

        @media print {
            @page { margin: 0; }
            body { background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            #printReceipt { 
                display: block !important; 
                width: 80mm; 
                margin: 0 auto; 
                padding: 5mm;
                box-sizing: border-box; 
                color: black;
                font-family: 'Courier New', monospace;
            }
            .row { display: flex; justify-content: space-between; width: 100%; font-size: 12px; margin: 4px 0; }
            hr { border: 0; border-top: 1px dashed #000; }
        }

        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin-top: 10px; }
        .btn-add { background: var(--primary); }
        .btn-print { background: #333; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .receipt-header { text-align: center; }
    </style>
</head>
<body>

<div class="main-wrapper no-print">
    <!-- INVENTORY MANAGEMENT -->
    <div class="card">
        <h2>Inventory Control</h2>
        <select id="itemType" onchange="toggleQtyInput()">
            <option value="product">Product (Retail Stock)</option>
            <option value="service">Service (Salon Works)</option>
        </select>
        
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemPrice" placeholder="Base Price (₹)">
        <input type="number" id="itemQty" placeholder="Initial Stock" value="1">
        
        <button class="btn-add" onclick="saveToDatabase()">Add to Inventory</button>

        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>Type</th><th>Name</th><th>Price</th><th>Stock</th></tr>
                </thead>
                <tbody id="inventoryList"></tbody>
            </table>
        </div>
    </div>

    <!-- BILLING AREA -->
    <div class="card">
        <h2>Generate Bill</h2>
        <label>Select Item:</label>
        <select id="itemSelect"></select>
        
        <label>Quantity:</label>
        <input type="number" id="billQty" value="1" min="1">
        
        <button class="btn-print" onclick="processBill()">Print & Deduct Stock</button>
    </div>
</div>

<!-- PRINT TEMPLATE -->
<div id="printReceipt">
    <div class="receipt-header">
        <h1 style="font-size: 18px; margin: 0;">KHUSHANA MAKEUP STUDIO</h1>
        <p style="font-size: 10px;">GSTIN: 09XXXXX1234X1Z1</p>
        <p id="rDate" style="font-size: 10px;"></p>
    </div>
    <hr>
    <div id="rItems"></div>
    <hr>
    <div class="row"><span>Sub-Total:</span><span id="rBase"></span></div>
    <div class="row"><span>GST (18%):</span><span id="rGst"></span></div>
    <hr>
    <div class="row" style="font-weight:bold; font-size:1.1em;"><span>TOTAL:</span><span id="rTotal"></span></div>
    <p style="text-align: center; margin-top: 15px; font-size: 10px;">Thank you for your visit!</p>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAWnqBp3OdNg6JGjJ_xGsJsCTeOg_bp_8A",
        authDomain: "khushanastudio.firebaseapp.com",
        projectId: "khushanastudio",
        storageBucket: "khushanastudio.firebasestorage.app",
        messagingSenderId: "988189434269",
        appId: "1:988189434269:web:e0afc4deac7c0a21da4f74",
        measurementId: "G-L4L0G6F6M3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function toggleQtyInput() {
        const type = document.getElementById('itemType').value;
        const qtyInput = document.getElementById('itemQty');
        if(type === 'service') {
            qtyInput.value = "0"; 
            qtyInput.style.display = "none";
        } else {
            qtyInput.value = "1";
            qtyInput.style.display = "block";
        }
    }

    // --- REFRESH UI ---
    function loadInventory() {
        db.collection("inventory").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
            const list = document.getElementById('inventoryList');
            const select = document.getElementById('itemSelect');
            
            list.innerHTML = '';
            select.innerHTML = '<option value="">-- Select Item --</option>';

            querySnapshot.forEach((doc) => {
                const item = doc.data();
                const id = doc.id;
                const isService = item.type === 'service';
                
                const stockVal = isService ? "∞" : (item.qty || 0);
                const typeBadge = isService ? '<span class="badge badge-serv">Service</span>' : '<span class="badge badge-prod">Product</span>';

                list.innerHTML += `<tr>
                    <td>${typeBadge}</td>
                    <td>${item.name}</td>
                    <td>₹${item.price}</td>
                    <td>${stockVal}</td>
                </tr>`;

                select.innerHTML += `<option value="${id}">${item.name} (${isService ? 'Service' : 'Stock: ' + stockVal})</option>`;
            });
        });
    }

    async function saveToDatabase() {
        const type = document.getElementById('itemType').value;
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const qty = parseInt(document.getElementById('itemQty').value) || 0;

        if(!name || isNaN(price)) return alert("Fill Name and Price");

        try {
            await db.collection("inventory").add({
                type: type,
                name: name,
                price: price,
                qty: qty,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
        } catch (e) { alert(e.message); }
    }

    // --- FIX: FETCH LATEST DATA BEFORE DEDUCTING ---
    async function processBill() {
        const select = document.getElementById('itemSelect');
        const docId = select.value;
        const qtyToBill = parseInt(document.getElementById('billQty').value);

        if(!docId) return alert("Select an item first");

        try {
            // Get the most current data from Firebase directly
            const docRef = db.collection("inventory").doc(docId);
            const docSnap = await docRef.get();

            if (!docSnap.exists) return alert("Item not found!");

            const itemData = docSnap.data();
            const type = itemData.type;
            const currentStock = parseInt(itemData.qty) || 0;

            // Check stock for products
            if(type === 'product') {
                if(qtyToBill > currentStock) {
                    return alert(`Low Stock! You have ${currentStock} left.`);
                }
                // Deduct stock
                await docRef.update({
                    qty: currentStock - qtyToBill
                });
            }

            // Receipt Calculations
            const base = itemData.price * qtyToBill;
            const gst = base * 0.18;
            const total = base + gst;

            document.getElementById('rDate').innerText = "Date: " + new Date().toLocaleString();
            document.getElementById('rItems').innerHTML = `<div class="row">
                <span>${itemData.name} x ${qtyToBill}</span>
                <span>₹${base.toFixed(2)}</span>
            </div>`;
            document.getElementById('rBase').innerText = "₹" + base.toFixed(2);
            document.getElementById('rGst').innerText = "₹" + gst.toFixed(2);
            document.getElementById('rTotal').innerText = "₹" + total.toFixed(2);

            window.print();

        } catch (e) {
            console.error(e);
            alert("Transaction failed: " + e.message);
        }
    }

    loadInventory();
</script>
</body>
</html>
