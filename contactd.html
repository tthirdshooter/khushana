<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Khushana Digital | WhatsApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #25d366; /* WhatsApp Green */
            --secondary: #075e54; /* WhatsApp Dark Green */
            --dark: #121b22;
            --light: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--light); color: var(--dark); padding: 40px 20px; }

        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header { background: var(--secondary); color: white; padding: 30px; text-align: center; }
        .header i { font-size: 3rem; margin-bottom: 10px; }
        .header h1 { font-size: 1.8rem; }

        .form-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #555; }
        
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 1rem; 
            background: #fafafa;
        }

        input:focus, textarea:focus { outline: none; border-color: var(--primary); background: #fff; }

        .whatsapp-btn { 
            background: var(--primary); 
            color: white; 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            transition: 0.3s;
        }

        .whatsapp-btn:hover { background: #128c7e; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fab fa-whatsapp"></i>
            <h1>Khushana Digital</h1>
            <p>Instant Project Inquiry</p>
        </div>

        <div class="form-body">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Service Required</label>
                <select id="service">
                    <option value="Web Design">Web Design</option>
                    <option value="Digital Marketing">Digital Marketing</option>
                    <option value="Graphic Design">Graphic Design</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="4" placeholder="How can we help you?"></textarea>
            </div>

            <button type="button" class="whatsapp-btn" onclick="sendToWhatsApp()">
                <i class="fab fa-whatsapp"></i> Chat on WhatsApp
            </button>
        </div>
    </div>

    <script>
        function sendToWhatsApp() {
            // --- SET YOUR PHONE NUMBER HERE ---
            // Format: Country Code + Number (No + or spaces)
            const phoneNumber = "91+9149509617"; 

            const name = document.getElementById('name').value;
            const service = document.getElementById('service').value;
            const message = document.getElementById('message').value;

            if (name === "" || message === "") {
                alert("Please fill in your name and message.");
                return;
            }

            // Construct the encoded message
            const text = "Hello Khushana Digital!%0A%0A" + 
                         "*Name:* " + name + "%0A" + 
                         "*Service:* " + service + "%0A" + 
                         "*Message:* " + message;

            // Open the WhatsApp URL
            const url = "https://wa.me/" + 9149509617 + "?text=" + text;
            window.open(url, '_blank').focus();
        }
    </script>

</body>
</html>
