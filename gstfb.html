<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Khushana Makeup Studio | Inventory & Services</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #720e3d; --accent: #f48fb1; --bg: #fff5f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        @media screen {
            .main-wrapper { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
            .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
            #printReceipt { display: none; }
        }

        @media print {
            body * { visibility: hidden; }
            #printReceipt, #printReceipt * { visibility: visible; }
            #printReceipt { position: absolute; left: 0; top: 0; width: 100%; display: block !important; padding: 20px; }
        }

        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; margin-top: 10px; }
        .btn-add { background: var(--primary); }
        .btn-print { background: #333; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .badge { padding: 3px 7px; border-radius: 4px; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .badge-prod { background: #e3f2fd; color: #1976d2; }
        .badge-serv { background: #f3e5f5; color: #7b1fa2; }

        .receipt-box { font-family: 'Courier New', Courier, monospace; }
        .receipt-header { text-align: center; }
        .row { display: flex; justify-content: space-between; margin: 5px 0; }
    </style>
</head>
<body>

<div class="main-wrapper no-print">
    <!-- ADD SECTION -->
    <div class="card">
        <h2>Add Item or Service</h2>
        <div style="display: flex; gap: 10px;">
            <select id="itemType" onchange="toggleQtyInput()">
                <option value="product">Product (Retail)</option>
                <option value="service">Service (Hair, Wax, etc.)</option>
            </select>
        </div>
        <input type="text" id="itemName" placeholder="Name (e.g., Haircut or Shampoo)">
        <input type="number" id="itemPrice" placeholder="Price (₹)">
        <input type="number" id="itemQty" placeholder="Initial Stock Quantity" value="1">
        
        <button class="btn-add" onclick="saveToDatabase()">Add to Menu/Stock</button>

        <table>
            <thead>
                <tr><th>Type</th><th>Name</th><th>Price</th><th>Stock</th></tr>
            </thead>
            <tbody id="inventoryList"></tbody>
        </table>
    </div>

    <!-- BILLING SECTION -->
    <div class="card">
        <h2>Generate Bill</h2>
        <label>Select Item/Service:</label>
        <select id="itemSelect"></select>
        <label>Quantity/Units:</label>
        <input type="number" id="billQty" value="1" min="1">
        <button class="btn-print" onclick="processBill()">Print Receipt</button>
    </div>
</div>

<!-- RECEIPT TEMPLATE -->
<div id="printReceipt" class="receipt-box">
    <div class="receipt-header">
        <h1>KHUSHANA MAKEUP STUDIO</h1>
        <p>GSTIN: 09XXXXX1234X1Z1</p>
        <p id="rDate"></p>
    </div>
    <hr>
    <div id="rItems"></div>
    <hr>
    <div class="row"><span>Base:</span><span id="rBase"></span></div>
    <div class="row"><span>GST (18%):</span><span id="rGst"></span></div>
    <div class="row" style="font-weight:bold; font-size:1.2em;"><span>Total:</span><span id="rTotal"></span></div>
    <p style="text-align: center; margin-top: 20px;">Thank you for visiting!</p>
</div>

<script>
    // Firebase Config (Keep your existing one)
    const firebaseConfig = {
        apiKey: "AIzaSyAWnqBp3OdNg6JGjJ_xGsJsCTeOg_bp_8A",
        authDomain: "khushanastudio.firebaseapp.com",
        projectId: "khushanastudio",
        storageBucket: "khushanastudio.firebasestorage.app",
        messagingSenderId: "988189434269",
        appId: "1:988189434269:web:e0afc4deac7c0a21da4f74",
        measurementId: "G-L4L0G6F6M3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Disable Quantity input if Service is selected
    function toggleQtyInput() {
        const type = document.getElementById('itemType').value;
        const qtyInput = document.getElementById('itemQty');
        if(type === 'service') {
            qtyInput.value = "9999"; // Services don't really run out
            qtyInput.style.display = "none";
        } else {
            qtyInput.value = "1";
            qtyInput.style.display = "block";
        }
    }

    function loadInventory() {
        db.collection("inventory").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
            const list = document.getElementById('inventoryList');
            const select = document.getElementById('itemSelect');
            list.innerHTML = '';
            select.innerHTML = '<option value="">-- Choose Item --</option>';

            querySnapshot.forEach((doc) => {
                const item = doc.data();
                const id = doc.id;
                const isService = item.type === 'service';
                
                // Show "∞" for services instead of a number
                const stockDisplay = isService ? "∞" : item.qty;
                const typeBadge = isService ? '<span class="badge badge-serv">Service</span>' : '<span class="badge badge-prod">Product</span>';

                list.innerHTML += `<tr>
                    <td>${typeBadge}</td>
                    <td>${item.name}</td>
                    <td>₹${item.price}</td>
                    <td>${stockDisplay}</td>
                </tr>`;

                select.innerHTML += `<option value="${id}" 
                    data-price="${item.price}" 
                    data-name="${item.name}" 
                    data-qty="${item.qty}" 
                    data-type="${item.type}">${item.name} (${isService ? 'Service' : 'Stock: '+item.qty})</option>`;
            });
        });
    }

    async function saveToDatabase() {
        const type = document.getElementById('itemType').value;
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const qty = parseInt(document.getElementById('itemQty').value);

        if(!name || isNaN(price)) return alert("Please fill Name and Price");

        try {
            await db.collection("inventory").add({
                type: type,
                name: name,
                price: price,
                qty: qty,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Added Successfully!");
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
        } catch (e) { alert(e.message); }
    }

    async function processBill() {
        const select = document.getElementById('itemSelect');
        const docId = select.value;
        const qtyToBill = parseInt(document.getElementById('billQty').value);

        if(!docId) return alert("Select an item/service");

        const opt = select.options[select.selectedIndex];
        const type = opt.getAttribute('data-type');
        const currentQty = parseInt(opt.getAttribute('data-qty'));
        const price = parseFloat(opt.getAttribute('data-price'));
        const name = opt.getAttribute('data-name');

        // Check stock only for products
        if(type === 'product' && qtyToBill > currentQty) return alert("Not enough stock!");

        try {
            // Only deduct from Firebase if it's a product
            if(type === 'product') {
                await db.collection("inventory").doc(docId).update({
                    qty: currentQty - qtyToBill
                });
            }

            // Calculations
            const base = price * qtyToBill;
            const gst = base * 0.18;
            const total = base + gst;

            document.getElementById('rDate').innerText = new Date().toLocaleString();
            document.getElementById('rItems').innerHTML = `<div class="row"><span>${name} x ${qtyToBill}</span><span>₹${base.toFixed(2)}</span></div>`;
            document.getElementById('rBase').innerText = "₹" + base.toFixed(2);
            document.getElementById('rGst').innerText = "₹" + gst.toFixed(2);
            document.getElementById('rTotal').innerText = "₹" + total.toFixed(2);

            window.print();
        } catch (e) { alert("Error: " + e.message); }
    }

    loadInventory();
</script>
</body>
</html>
