
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | Khushana Makeup Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Olive & Gold Palette */
            --satin-olive: #3b441b;      /* Rich, deep olive */
            --dark-olive: #2a3112;       /* Shadow olive */
            --gold-foil: #c5a059;        /* True metallic gold */
            --gold-light: #e2c285;       /* Shimmering gold */
            --off-white: #f9f9f2;        /* Olive-tinted white for text contrast */
            --input-bg: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            margin: 0;
            /* Deep Olive Radial Gradient for a "Studio" feel */
            background: radial-gradient(circle at center, #4a5426 0%, #1a1f0a 100%);
            color: var(--off-white);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .booking-card {
            background: var(--dark-olive);
            width: 100%;
            max-width: 480px;
            padding: 60px 45px;
            border: 1px solid rgba(197, 160, 89, 0.3); /* Subtle gold border */
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            border-radius: 2px; /* Sharp edges for a more modern premium feel */
        }

        /* The "Golden Line" - Signature Detail */
        .booking-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-foil), transparent);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 45px;
        }

        .logo-container img {
            height: 65px;
            filter: brightness(0) invert(1) drop-shadow(0 0 5px rgba(197, 160, 89, 0.5));
            transition: var(--transition);
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold-light);
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 40px;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 400;
        }

        .form-group { margin-bottom: 28px; }

        label {
            display: block;
            margin-bottom: 12px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--gold-foil);
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid #4a5426;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            box-sizing: border-box;
            border-radius: 0;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold-light);
            outline: none;
            background: rgba(197, 160, 89, 0.05);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: var(--gold-foil);
            color: var(--dark-olive);
            border: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 4px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background: var(--gold-light);
            letter-spacing: 5px;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.3);
        }

        .call-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background: transparent;
            color: var(--gold-light);
            border: 1px solid var(--gold-foil);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            letter-spacing: 2px;
            box-sizing: border-box;
        }

        .call-btn:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: #fff;
        }

        .business-hours {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(197, 160, 89, 0.2);
            text-align: center;
            color: var(--gold-foil);
            font-size: 0.65rem;
            line-height: 2;
            letter-spacing: 1.5px;
            opacity: 0.8;
        }

        .nav-home {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #6a7545;
            text-decoration: none;
            font-size: 0.6rem;
            letter-spacing: 3px;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .nav-home:hover { color: var(--gold-light); }

        /* Custom Arrow for select */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c5a059' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 14px;
        }

        #success-message {
            display: none;
            text-align: center;
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div class="booking-card">
        <div class="logo-container">
            <a href="studio.html">
                <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/greenlogo.png" alt="Khushana Logo">  
            </a>
        </div>

        <div id="form-container">
            <h2>Consultation</h2>
            <form id="whatsappForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="e.g. Sophia Loren" required>
                </div>

                <div class="form-group">
                    <label>Interest</label>
                    <select id="interest">
                        <option value="Beauty">Khushana Makeup Studio (Beauty)</option>
                        <option value="Tech">Khushana Digital Info (Tech)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Desired Service</label>
                    <select id="service">
                        <option>Bridal Makeup</option>
                        <option>Nail Art / Manicure</option>
                        <option>Haircut / Styling</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea id="userMsg" rows="3" placeholder="Tell us about your requirements..."></textarea>
                </div>

                <button type="submit" class="submit-btn">SEND INQUIRY</button>
            </form>
            
            <a href="tel:+917889425218" class="call-btn">DIRECT CALL</a>
        </div>

        <div id="success-message">
            <h3 style="font-family: 'Cinzel'; color: var(--gold-light); letter-spacing: 4px; margin-bottom: 10px;">REQUEST INITIATED</h3>
            <p style="font-size: 0.75rem; color: #8a9465;">Connecting you to our specialist via WhatsApp...</p>
            <button onclick="location.reload()" class="nav-home" style="border:none; background:none; cursor:pointer; width:100%;">Refresh Form</button>
        </div>

        <div class="business-hours">
            <span style="font-weight: 700;">STUDIO HOURS</span><br>
            MON – SAT: 10:00 AM – 8:00 PM<br>
            <span style="font-style: italic; opacity: 0.7;">By Appointment Only</span>
        </div>

        <a href="index.html" class="nav-home">Return to Portal</a>
    </div>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const myPhoneNumber = "917889425218"; 

            const name = document.getElementById('userName').value;
            const interest = document.getElementById('interest').value;
            const service = document.getElementById('service').value;
            const message = document.getElementById('userMsg').value;

            const whatsappMessage = `*New Website Inquiry*%0A` +
                `--------------------------%0A` +
                `*Name:* ${encodeURIComponent(name)}%0A` +
                `*Interest:* ${encodeURIComponent(interest)}%0A` +
                `*Service:* ${encodeURIComponent(service)}%0A` +
                `*Message:* ${encodeURIComponent(message)}`;

            const url = `https://wa.me/${myPhoneNumber}?text=${whatsappMessage}`;
            const formContainer = document.getElementById('form-container');
            const successMsg = document.getElementById('success-message');

            formContainer.style.opacity = '0';
            formContainer.style.transform = 'translateY(10px)';
            formContainer.style.transition = 'all 0.4s ease';
            
            setTimeout(() => {
                formContainer.style.display = 'none';
                successMsg.style.display = 'block';
                window.open(url, '_blank');
            }, 400);
        });
    </script>
</body>
</html>
