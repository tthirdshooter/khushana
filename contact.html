<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | Khushana Makeup Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --satin-olive: #3b441b;
            --dark-olive: #1a1f0a;
            --card-olive: #2a3112;
            --gold-foil: #c5a059;
            --gold-light: #e2c285;
            --off-white: #f9f9f2;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #3b441b 0%, #0d1105 100%);
            color: var(--off-white);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .booking-card {
            background: var(--card-olive);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Gold Top Border */
        .booking-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-foil), transparent);
        }

        /* FIX: Logo Visibility */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            max-height: 90px;
            width: auto;
            max-width: 200px;
            /* Filter removed for better compatibility; adds a subtle gold glow instead */
            filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.3));
            transition: var(--transition);
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold-light);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold-foil);
            font-weight: 600;
        }

        /* FIX: Combo Box (Select) Visibility */
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.4); /* Darker for contrast */
            border: 1px solid #4a5426;
            color: var(--off-white) !important; /* Forces white text */
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            border-radius: 4px;
        }

        /* Ensures dropdown options are visible on all browsers */
        select option {
            background-color: var(--card-olive);
            color: white;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold-light);
            outline: none;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold-foil);
            color: var(--dark-olive);
            border: none;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .call-btn {
            display: block;
            text-align: center;
            padding: 12px;
            margin-top: 15px;
            color: var(--gold-light);
            border: 1px solid var(--gold-foil);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: var(--transition);
        }

        .call-btn:hover {
            background: rgba(197, 160, 89, 0.1);
        }

        .business-hours {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(197, 160, 89, 0.1);
            text-align: center;
            color: var(--gold-foil);
            font-size: 0.65rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .nav-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #6a7545;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* Custom Dropdown Arrow */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c5a059' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 12px;
        }
    </style>
</head>
<body>

    <div class="booking-card">
        <div class="logo-container">
            <a href="studio.html">
                <!-- If the logo doesn't show, verify this URL in a browser -->
                <img src="https://raw.githubusercontent.com/tthirdshooter/khushana/main/images/logo1.png" alt="Khushana Logo" onerror="this.src='https://via.placeholder.com/150x80/2a3112/c5a059?text=KHUSHANA'">
            </a>
        </div>

        <div id="form-container">
            <h2>Consultation</h2>
            <form id="whatsappForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label>Interest</label>
                    <select id="interest">
                        <option value="Beauty">Khushana Makeup Studio (Beauty)</option>
                        <option value="Tech">Khushana Digital Info (Tech)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Desired Service</label>
                    <select id="service">
                        <option>Bridal Makeup</option>
                        <option>Nail Art / Manicure</option>
                        <option>Haircut / Styling</option>
                        <option>Web Design / Digital Services</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea id="userMsg" rows="3" placeholder="Tell us what you need..."></textarea>
                </div>

                <button type="submit" class="submit-btn">SEND VIA WHATSAPP</button>
            </form>
            
            <a href="tel:+917889425218" class="call-btn">CALL US DIRECTLY</a>
        </div>

        <div class="business-hours">
            <strong>STUDIO HOURS</strong><br>
            MON – SAT: 10:00 AM – 8:00 PM
        </div>

        <a href="index.html" class="nav-home">Back to Portal</a>
    </div>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = "917889425218"; 
            const name = document.getElementById('userName').value;
            const interest = document.getElementById('interest').value;
            const service = document.getElementById('service').value;
            const msg = document.getElementById('userMsg').value;

            const text = `*New Inquiry*%0A*Name:* ${name}%0A*Interest:* ${interest}%0A*Service:* ${service}%0A*Message:* ${msg}`;
            window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
        });
    </script>
</body>
</html>
